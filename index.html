/* ── AUDIO ENGINE ── */
const audioCtx=typeof AudioContext!=='undefined'?new AudioContext():null;
function playBeep(freq=880,dur=.12,vol=.3){
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.frequency.value=freq;o.type='square';
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function playChord(){
  if(!audioCtx)return;
  [261.6,329.6,392,523.2].forEach((f,i)=>{
    setTimeout(()=>playBeep(f,.6,.2),i*80);
  });
}

/* ── TIE SCORE CALCULATOR ── */
function calcTieScores(placements){
  // placements: {clanId: place (1-6 or 0 for DNF)}
  const groups={};
  Object.entries(placements).forEach(([cid,p])=>{
    if(p===0)return; // DNF
    if(!groups[p])groups[p]=[];
    groups[p].push(cid);
  });
  const result={};
  // Sort place numbers
  const sortedPlaces=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  let consumed=0;
  sortedPlaces.forEach(place=>{
    const teamCount=groups[place].length;
    let totalPts=0;
    for(let i=0;i<teamCount;i++){
      const effectivePlace=consumed+i+1;
      totalPts+=(POINTS[effectivePlace]||0);
    }
    const avg=totalPts/teamCount;
    groups[place].forEach(cid=>{result[cid]=avg});
    consumed+=teamCount;
  });
  // DNF = 0
  Object.entries(placements).forEach(([cid,p])=>{
    if(p===0)result[cid]=0;
  });
  return result;
}

function getConsumedPlaces(placements){
  // Returns set of place NUMBERS that are consumed (spillover from ties)
  // A place is "consumed" if it falls within the range eaten by a tie above it
  // But the original place number itself is NEVER blocked — multiple teams CAN pick the same number
  const consumed=new Set();
  const groups={};
  Object.entries(placements).forEach(([cid,p])=>{
    if(p===0)return;
    if(!groups[p])groups[p]=[];
    groups[p].push(cid);
  });
  const sortedPlaces=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  let pos=0;
  sortedPlaces.forEach(place=>{
    const count=groups[place].length;
    // The first slot maps to the original place number (NOT consumed)
    // Additional slots (from ties) ARE consumed
    for(let i=1;i<count;i++){consumed.add(place+i)}
    pos+=count;
  });
  return consumed;
}

  // Get clan members from roster
  function getClanMembers(clanId){
    const clan=clans.find(c=>c.id===clanId);
    if(!clan)return [];
    return (clan.memberIds||[]).map(mid=>roster.find(r=>r.id===mid)).filter(Boolean);
  }

  function getUnassigned(){
    const assigned=new Set();
    clans.forEach(c=>(c.memberIds||[]).forEach(mid=>assigned.add(mid)));
    return roster.filter(r=>!assigned.has(r.id));
  }

  // Lock in placements
  function lockPlacements(){
    if(!currentEvent)return;
    const pts=calcTieScores(placements);
    setScoreReveal(true);
    playBeep(523.2,.2,.2);
    setTimeout(()=>{
      setScores(prev=>({...prev,[currentEvent.id]:pts}));
      setPlacements({});
      playChord();
      setTimeout(()=>setScoreReveal(false),1200);
    },600);
  }

  function clearPlacements(){setPlacements({})}

  function resetRound(){
    if(!currentEvent)return;
    setScores(prev=>{const n={...prev};delete n[currentEvent.id];return n});
    setPlacements({});
  }

  // Roster management
  function addPerson(name){
    if(!name.trim())return;
    const id='p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    setRoster(prev=>[...prev,{id,name:name.trim(),photo:null}]);
    return id;
  }

  function removePerson(id){
    setRoster(prev=>prev.filter(r=>r.id!==id));
    setClans(prev=>prev.map(c=>({...c,memberIds:(c.memberIds||[]).filter(mid=>mid!==id)})));
  }

  function assignToClan(personId,clanId){
    // Remove from all clans first
    setClans(prev=>prev.map(c=>({
      ...c,
      memberIds:(c.memberIds||[]).filter(mid=>mid!==personId).concat(c.id===clanId?[personId]:[])
    })));
  }

  function unassignFromClan(personId){
    setClans(prev=>prev.map(c=>({...c,memberIds:(c.memberIds||[]).filter(mid=>mid!==personId)})));
  }

  function quickAddToClan(name,clanId){
    const id=addPerson(name);
    if(id)assignToClan(id,clanId);
  }

  function handlePhotoUpload(e,personId){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const size=Math.min(img.width,img.height,200);
        canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        const sx=(img.width-size)/2,sy=(img.height-size)/2;
        ctx.drawImage(img,sx,sy,size,size,0,0,size,size);
        const dataUrl=canvas.toDataURL('image/jpeg',.8);
        setRoster(prev=>prev.map(r=>r.id===personId?{...r,photo:dataUrl}:r));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Questions
  function addQuestion(eventId,text){
    if(!text.trim())return;
    setEvents(prev=>prev.map(e=>e.id===eventId?{...e,questions:[...e.questions,{id:'q_'+Date.now(),text:text.trim()}]}:e));
  }
  function removeQuestion(eventId,qId){
    setEvents(prev=>prev.map(e=>e.id===eventId?{...e,questions:e.questions.filter(q=>q.id!==qId)}:e));
  }

  function showQuestionAndTimer(q,secs){
    setActiveQuestion(q);
    startTimer(secs);
    setShowCombined(true);
  }

  /* ══════════════════ RENDER ══════════════════ */

  const consumed=getConsumedPlaces(placements);
  const previewScores=calcTieScores(placements);

  return(
    <div style={{display:'flex',width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
      {/* ── DISPLAY AREA ── */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {/* Background — theme aware */}
        <ForgeBackground/>

        {/* Main scoreboard content */}
        <div style={{position:'relative',zIndex:5,display:'flex',flexDirection:'column',height:'100%',padding:'12px 16px'}}>
          {/* Header */}
          <div style={{textAlign:'center',padding:'8px 0',flexShrink:0}}>
            <h1 style={{fontFamily:"'Saira Stencil One',sans-serif",fontSize:'2rem',color:T.gold,
              textShadow:`0 0 20px rgba(200,160,80,.4),0 0 40px rgba(200,160,80,.2)`,
              letterSpacing:'4px',margin:0}}>THE MANDALORIAN GAMES</h1>
            <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'.75rem',color:T.textDim,letterSpacing:'6px',
              textTransform:'uppercase',marginTop:'2px'}}>
              {finaleScored?'GRAND TOTAL':'GUILD RANKINGS'} &mdash; THIS IS THE WAY
            </div>
          </div>

          {/* Event Tracker */}
          <EventTracker events={events} scores={scores} currentIdx={currentEventIdx}
            onSelect={(i)=>setCurrentEventIdx(i)}/>

          {/* Bounty Cards */}
          <div style={{flex:1,overflow:'auto',padding:'8px 0',display:'flex',flexDirection:'column',gap:'8px'}}>
            {rankings.map((clan,idx)=>(
              <BountyCard key={clan.id} clan={clan} rank={idx+1} members={getClanMembers(clan.id)}
                finaleScored={finaleScored} events={events} scores={scores}/>
            ))}
          </div>

          {/* Footer — Product Logos */}
          <ProductLogos height={28}/>
        </div>

        {/* ── OVERLAYS (display area only) ── */}
        {(timerActive||timerRemaining===0&&timerSeconds>0)&&!showCombined&&(
          <TimerOverlay remaining={timerRemaining} total={timerSeconds}
            onDismiss={()=>{stopTimer();setTimerSeconds(0)}}/>
        )}
        {activeQuestion&&!showCombined&&(
          <QuestionOverlay question={activeQuestion}
            onDismiss={()=>setActiveQuestion(null)}/>
        )}
        {showCombined&&(
          <CombinedOverlay question={activeQuestion} remaining={timerRemaining} total={timerSeconds}
            onDismissQuestion={()=>{setActiveQuestion(null);if(!timerActive)setShowCombined(false)}}
            onDismissTimer={()=>{stopTimer();setTimerSeconds(0);if(!activeQuestion)setShowCombined(false)}}
            onDismissAll={()=>{stopTimer();setTimerSeconds(0);setActiveQuestion(null);setShowCombined(false)}}/>
        )}

        {/* Score reveal flash */}
        {scoreReveal&&(
          <div style={{position:'absolute',inset:0,zIndex:55,pointerEvents:'none',
            background:'radial-gradient(ellipse at center,rgba(200,160,80,.2),transparent 70%)',
            animation:'score-flash .8s ease-out forwards'}}/>
        )}

        {/* Splash / Intro Screen */}
        {showSplash&&(
          <div onClick={()=>setShowSplash(false)} style={{position:'absolute',inset:0,zIndex:60,cursor:'pointer',
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            background:'radial-gradient(ellipse at 50% 30%,#1a1510,#0a0a0f)'}}>
            {/* Stars */}
            {Array.from({length:80},(_,i)=>(
              <div key={i} style={{position:'absolute',
                left:Math.random()*100+'%',top:Math.random()*100+'%',
                width:1+Math.random()*2,height:1+Math.random()*2,borderRadius:'50%',
                background:'#fff',opacity:.2+Math.random()*.5,
                animation:`star-twinkle ${2+Math.random()*4}s ${Math.random()*3}s infinite`}}/>
            ))}
            <div style={{animation:'slide-in 1s ease-out',textAlign:'center',position:'relative',zIndex:1}}>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'.9rem',color:T.textDim,
                letterSpacing:'8px',marginBottom:16}}>A LONG TIME AGO IN A GALAXY FAR, FAR AWAY...</div>
              <h1 style={{fontFamily:"'Saira Stencil One',sans-serif",fontSize:'4rem',color:T.gold,
                textShadow:'0 0 40px rgba(200,160,80,.5),0 0 80px rgba(200,160,80,.2)',
                letterSpacing:'6px',lineHeight:1.1,marginBottom:12}}>
                THE<br/>MANDALORIAN<br/>GAMES
              </h1>
              <div style={{width:200,height:2,background:`linear-gradient(90deg,transparent,${T.gold},transparent)`,
                margin:'16px auto'}}/>
              <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'1rem',color:T.textDim,
                letterSpacing:'4px',marginBottom:8}}>3-D MATRIX NATIONAL KICKOFF MEETING 2026</div>
              <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'.8rem',color:T.gold,
                letterSpacing:'3px',marginTop:24,opacity:.8}}>THIS IS THE WAY</div>
              <div style={{marginTop:32}}><ProductLogos height={24}/></div>
              <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'.65rem',color:T.textDim,
                marginTop:32,animation:'pulse-glow 2s infinite',letterSpacing:'2px'}}>
                CLICK ANYWHERE TO BEGIN
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── ADMIN PANEL ── */}
      {showAdmin&&(
        <div style={{width:360,minWidth:360,height:'100%',background:T.panel,
          borderLeft:`1px solid ${T.panelBorder}`,display:'flex',flexDirection:'column',
          overflow:'hidden',zIndex:100}}>
          {/* Admin Header */}
          <div style={{padding:'12px',borderBottom:`1px solid ${T.panelBorder}`,display:'flex',
            alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:'.8rem',color:T.gold,letterSpacing:'2px'}}>
              ADMIN CONTROL
            </span>
            <div style={{display:'flex',gap:'6px'}}>
              <button onClick={saveState} style={btnSmall} title="Save">&#128190; SAVE</button>
              <button onClick={()=>setShowAdmin(false)} style={{...btnSmall,background:'rgba(200,50,50,.3)'}}
                title="Hide (Esc)">&#10005;</button>
            </div>
          </div>

          {/* Tab Switcher */}
          <div style={{display:'flex',borderBottom:`1px solid ${T.panelBorder}`,flexShrink:0}}>
            {[['live','LIVE CONTROL'],['setup','SETUP']].map(([key,label])=>(
              <button key={key} onClick={()=>setAdminTab(key)}
                style={{flex:1,padding:'10px',background:adminTab===key?'rgba(200,160,80,.15)':'transparent',
                  color:adminTab===key?T.gold:T.textDim,border:'none',cursor:'pointer',
                  fontFamily:"'Exo 2',sans-serif",fontSize:'.75rem',fontWeight:600,letterSpacing:'1px',
                  borderBottom:adminTab===key?`2px solid ${T.gold}`:'2px solid transparent'}}>
                {label}
              </button>
            ))}
          </div>

          {/* Admin Content */}
          <div style={{flex:1,overflow:'auto',padding:'12px'}}>
            {adminTab==='live'?(
              <LiveControl
                events={events} currentIdx={currentEventIdx} setCurrentIdx={setCurrentEventIdx}
                clans={clans} placements={placements} setPlacements={setPlacements}
                consumed={consumed} previewScores={previewScores}
                lockPlacements={lockPlacements} clearPlacements={clearPlacements}
                resetRound={resetRound} currentEventScored={currentEventScored}
                currentEvent={currentEvent}
                timerActive={timerActive} startTimer={startTimer} stopTimer={stopTimer}
                timerCustom={timerCustom} setTimerCustom={setTimerCustom}
                activeQuestion={activeQuestion} setActiveQuestion={setActiveQuestion}
                showCombined={showCombined} setShowCombined={setShowCombined}
                showQuestionAndTimer={showQuestionAndTimer}
                setTimerSeconds={setTimerSeconds}
              />
            ):(
              <SetupPanel
                roster={roster} clans={clans} events={events}
                setClans={setClans} setEvents={setEvents}
                addPerson={addPerson} removePerson={removePerson}
                assignToClan={assignToClan} unassignFromClan={unassignFromClan}
                quickAddToClan={quickAddToClan}
                newPersonName={newPersonName} setNewPersonName={setNewPersonName}
                quickAdds={quickAdds} setQuickAdds={setQuickAdds}
                handlePhotoUpload={handlePhotoUpload}
                fileInputRef={fileInputRef} uploadTargetRef={uploadTargetRef}
                setupSection={setupSection} setSetupSection={setSetupSection}
                getUnassigned={getUnassigned}
                addQuestion={addQuestion} removeQuestion={removeQuestion}
                newQuestionText={newQuestionText} setNewQuestionText={setNewQuestionText}
              />
            )}
          </div>
        </div>
      )}

      {/* Toggle button when admin hidden */}
      {!showAdmin&&(
        <button onClick={()=>setShowAdmin(true)}
          style={{position:'fixed',top:10,right:10,zIndex:200,background:'rgba(200,160,80,.2)',
            border:`1px solid ${T.gold}`,color:T.gold,padding:'8px 12px',cursor:'pointer',
            borderRadius:4,fontFamily:"'Orbitron',sans-serif",fontSize:'.65rem',letterSpacing:'1px'}}>
          &#9881; ADMIN
        </button>
      )}

      {/* Hidden file input for photo uploads */}
      <input type="file" ref={fileInputRef} accept="image/*" style={{display:'none'}}
        onChange={(e)=>{
          if(uploadTargetRef.current)handlePhotoUpload(e,uploadTargetRef.current);
          e.target.value='';
        }}/>
    </div>
  );
}

            width:s.size,height:s.size,borderRadius:'50%',
            background:'#f0a030',boxShadow:`0 0 ${s.size*3}px #e85020`,
            animation:`float-ember ${s.duration} ${s.delay} linear infinite`,opacity:s.opacity}}/>
        ))}
      </div>

      {/* Dark vignette */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:2,
        background:'radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(10,6,8,.4) 100%)'}}/>

      {/* Scan lines */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:2,
        background:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 6px)'}}/>
    </div>
  );
}

/* ══════════════════ EVENT TRACKER ══════════════════ */
function EventTracker({events,scores,currentIdx,onSelect}){
  return(
    <div style={{display:'flex',gap:'4px',padding:'6px 0',flexShrink:0,overflow:'auto',justifyContent:'center'}}>
      {events.map((evt,i)=>{
        const scored=!!scores[evt.id];
        const current=i===currentIdx;
        return(
          <button key={evt.id} onClick={()=>onSelect(i)}
            style={{padding:'4px 8px',border:`1px solid ${current?T.gold:scored?T.green:T.panelBorder}`,
              background:current?'rgba(200,160,80,.2)':scored?'rgba(60,150,90,.15)':'rgba(0,0,0,.3)',
              color:current?T.gold:scored?T.green:T.textDim,cursor:'pointer',borderRadius:3,
              fontFamily:"'Exo 2',sans-serif",fontSize:'.6rem',fontWeight:600,whiteSpace:'nowrap',
              backdropFilter:'blur(4px)',letterSpacing:'.5px',
              transition:'all .2s'}}>
            {scored&&'✓ '}{evt.isFinale?'★ ':''}{evt.name}
          </button>
        );
      })}
    </div>
  );
}

/* ══════════════════ BOUNTY CARD ══════════════════ */

      boxShadow:isFirst?`0 0 20px rgba(200,160,80,.15),inset 0 0 30px rgba(200,160,80,.05)`:'none',

      <div style={{

        border:`2px solid ${isFirst?T.goldBright:rank<=3?T.gold:'rgba(200,160,80,.2)'}`,
        fontFamily:"'Orbitron',sans-serif",fontSize:isFirst?'1.2rem':'1rem',
        fontWeight:900,color:isFirst?'#1a1510':rank<=3?T.gold:T.textDim,
        animation:isFirst?'pulse-glow 3s infinite':'none',
        position:'relative'
      }}>
        {rank<=3&&<div style={{position:'absolute',top:-1,left:-1,width:6,height:6,
          borderTop:`2px solid ${T.gold}`,borderLeft:`2px solid ${T.gold}`}}/>}
        {rank<=3&&<div style={{position:'absolute',top:-1,right:-1,width:6,height:6,
          borderTop:`2px solid ${T.gold}`,borderRight:`2px solid ${T.gold}`}}/>}
        {rank<=3&&<div style={{position:'absolute',bottom:-1,left:-1,width:6,height:6,
          borderBottom:`2px solid ${T.gold}`,borderLeft:`2px solid ${T.gold}`}}/>}
        {rank<=3&&<div style={{position:'absolute',bottom:-1,right:-1,width:6,height:6,
          borderBottom:`2px solid ${T.gold}`,borderRight:`2px solid ${T.gold}`}}/>}
        #{rank}
      </div>

      {/* Clan color bar */}
      <div style={{width:4,height:42,borderRadius:2,background:accent,flexShrink:0,
        boxShadow:`0 0 8px ${accent}`}}/>

      {/* Clan info */}
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{fontFamily:"'Saira Stencil One',sans-serif",fontSize:'1rem',color:T.text,
            textShadow:`0 0 10px ${accent}40`}}>
            {clan.name}
          </span>
          {isFirst&&<span style={{fontFamily:"'Exo 2',sans-serif",fontSize:'.55rem',
            background:'rgba(200,160,80,.2)',color:T.gold,padding:'1px 6px',borderRadius:2,
            letterSpacing:'1px',fontWeight:700}}>MOST WANTED</span>}
        </div>
        {/* Members */}
        {members.length>0&&(
          <div style={{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}}>
            {members.map(m=>(
              <div key={m.id} title={m.name}
                style={{width:28,height:28,borderRadius:'50%',
                  border:`2px solid ${accent}`,overflow:'hidden',flexShrink:0,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  background:m.photo?'none':clan.color,fontSize:'.5rem',fontWeight:700,
                  color:'#fff'}}>
                {m.photo?(
                  <img src={m.photo} alt={m.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                ):(
                  m.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Score */}
      <div style={{textAlign:'right',flexShrink:0}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'1.5rem',fontWeight:900,
          color:isFirst?T.goldBright:T.text,
          textShadow:isFirst?`0 0 15px rgba(200,160,80,.5)`:undefined}}>
          {finaleScored?clan.total:clan.subtotal}
        </div>
        <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'.55rem',color:T.textDim,letterSpacing:'1px'}}>
          {finaleScored?'GRAND TOTAL':'SUBTOTAL'}
        </div>
        {finaleScored&&clan.finaleScore>0&&(
          <div style={{fontSize:'.5rem',color:T.textDim,marginTop:1}}>
            {clan.subtotal} + {clan.finaleScore} finale
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════ OVERLAYS ══════════════════ */
function TimerOverlay({remaining,total,onDismiss}){
  const pct=total>0?(remaining/total)*100:0;
  const isUrgent=remaining<=10&&remaining>0;
  const isDone=remaining===0;
  const fmt=(s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  return(
    <div style={{position:'absolute',inset:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',
      background:isDone?'rgba(200,160,80,.15)':isUrgent?'rgba(180,40,40,.2)':'rgba(0,0,0,.85)',
      backdropFilter:'blur(8px)',animation:isUrgent?'countdown-pulse 1s infinite':'none'}}>
      <button onClick={onDismiss} style={overlayClose}>&times;</button>
      {isDone?(
        <div style={{textAlign:'center',animation:'slide-in .5s ease-out'}}>
          <div style={{fontFamily:"'Saira Stencil One',sans-serif",fontSize:'4rem',color:T.gold,
            textShadow:'0 0 30px rgba(200,160,80,.5)',letterSpacing:'6px'}}>
            THIS IS THE WAY
          </div>
        </div>
      ):(
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:isUrgent?'8rem':'6rem',fontWeight:900,
            color:isUrgent?T.red:T.text,
            textShadow:isUrgent?'0 0 30px rgba(200,40,40,.5)':'0 0 20px rgba(255,255,255,.2)',
            transition:'all .3s'}}>
            {fmt(remaining)}
          </div>
          {/* Progress ring */}
          <svg width="200" height="12" style={{marginTop:16}}>
            <rect x="0" y="4" width="200" height="4" rx="2" fill="rgba(255,255,255,.1)"/>
            <rect x="0" y="4" width={pct*2} height="4" rx="2"
              fill={isUrgent?T.red:T.gold} style={{transition:'width 1s linear'}}/>
          </svg>
        </div>
      )}
    </div>
  );
}

function QuestionOverlay({question,onDismiss}){
  if(!question)return null;
  return(
    <div style={{position:'absolute',inset:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',
      background:'rgba(0,10,20,.88)',backdropFilter:'blur(10px)'}}>
      <button onClick={onDismiss} style={overlayClose}>&times;</button>
      <div style={{maxWidth:'80%',textAlign:'center',animation:'slide-in .5s ease-out'}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'.8rem',color:T.cyan,letterSpacing:'3px',
          marginBottom:16}}>TRANSMISSION INCOMING</div>
        <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'2.2rem',fontWeight:300,color:T.text,
          lineHeight:1.4,textShadow:'0 0 20px rgba(80,200,208,.2)',
          borderLeft:`3px solid ${T.cyan}`,paddingLeft:24}}>
          {question.text}
        </div>
      </div>
    </div>
  );
}

function CombinedOverlay({question,remaining,total,onDismissQuestion,onDismissTimer,onDismissAll}){
  const pct=total>0?(remaining/total)*100:0;
  const isUrgent=remaining<=10&&remaining>0;
  const isDone=remaining===0;
  const fmt=(s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  return(
    <div style={{position:'absolute',inset:0,zIndex:50,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:30,
      background:isDone?'rgba(200,160,80,.12)':isUrgent?'rgba(180,40,40,.15)':'rgba(0,10,20,.88)',
      backdropFilter:'blur(10px)',animation:isUrgent?'countdown-pulse 1s infinite':'none'}}>
      <button onClick={onDismissAll} style={overlayClose}>&times;</button>

      {/* Question */}
      {question&&(
        <div style={{maxWidth:'80%',textAlign:'center',position:'relative'}}>
          <button onClick={onDismissQuestion}
            style={{position:'absolute',top:-10,right:-10,...btnTiny,background:'rgba(80,200,208,.2)',color:T.cyan}}>
            &times;
          </button>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'.7rem',color:T.cyan,letterSpacing:'3px',marginBottom:12}}>
            TRANSMISSION
          </div>
          <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:'1.8rem',fontWeight:300,color:T.text,
            lineHeight:1.4,textShadow:'0 0 15px rgba(80,200,208,.15)',
            borderLeft:`3px solid ${T.cyan}`,paddingLeft:20}}>
            {question.text}
          </div>
        </div>
      )}

      {/* Timer */}
      <div style={{textAlign:'center',position:'relative'}}>
        <button onClick={onDismissTimer}
          style={{position:'absolute',top:-10,right:-10,...btnTiny,background:'rgba(200,160,80,.2)',color:T.gold}}>
          &times;
        </button>
        {isDone?(
          <div style={{fontFamily:"'Saira Stencil One',sans-serif",fontSize:'3rem',color:T.gold,
            textShadow:'0 0 25px rgba(200,160,80,.4)',letterSpacing:'4px'}}>
            THIS IS THE WAY
          </div>
        ):(
          <>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'4rem',fontWeight:900,
              color:isUrgent?T.red:T.text,
              textShadow:isUrgent?'0 0 25px rgba(200,40,40,.4)':'0 0 15px rgba(255,255,255,.15)'}}>
              {fmt(remaining)}
            </div>
            <svg width="160" height="8" style={{marginTop:8}}>
              <rect x="0" y="2" width="160" height="4" rx="2" fill="rgba(255,255,255,.1)"/>
              <rect x="0" y="2" width={pct*1.6} height="4" rx="2"
                fill={isUrgent?T.red:T.gold} style={{transition:'width 1s linear'}}/>
            </svg>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════ LIVE CONTROL ══════════════════ */
function LiveControl({events,currentIdx,setCurrentIdx,clans,placements,setPlacements,
  consumed,previewScores,lockPlacements,clearPlacements,resetRound,currentEventScored,currentEvent,
  timerActive,startTimer,stopTimer,timerCustom,setTimerCustom,
  activeQuestion,setActiveQuestion,showCombined,setShowCombined,showQuestionAndTimer,setTimerSeconds}){

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      {/* Event Select */}
      <Section title="CURRENT EVENT">
        <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
          {events.map((evt,i)=>(
            <button key={evt.id} onClick={()=>setCurrentIdx(i)}
              style={{...btnSmall,
                background:i===currentIdx?'rgba(200,160,80,.25)':'rgba(255,255,255,.05)',
                color:i===currentIdx?T.gold:T.textDim,
                border:`1px solid ${i===currentIdx?T.gold:'rgba(255,255,255,.1)'}`}}>
              {evt.isFinale?'★ ':''}{evt.name}
            </button>
          ))}
        </div>
      </Section>

      {/* Placement Entry */}
      {currentEvent&&(
        <Section title={`SCORE: ${currentEvent.name}`}>
          {currentEventScored&&(
            <div style={{padding:'6px 10px',background:'rgba(60,150,90,.15)',borderRadius:4,
              fontSize:'.7rem',color:T.green,marginBottom:8}}>
              ✓ Scores locked for this event
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
            {clans.map(clan=>{
              const place=placements[clan.id]||null;
              const pts=previewScores[clan.id];
              const isTied=place&&Object.values(placements).filter(p=>p===place&&p!==0).length>1;
              return(
                <div key={clan.id} style={{padding:'6px',background:'rgba(0,0,0,.2)',borderRadius:4,
                  borderLeft:`3px solid ${clan.accent}`}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:'.75rem',fontWeight:600,color:T.text}}>{clan.name}</span>
                    {place!=null&&(
                      <span style={{fontSize:'.7rem',fontWeight:700,
                        color:place===0?T.red:T.gold}}>
                        {place===0?'DNF':`${pts} pts`}
                        {isTied&&<span style={{color:T.amber}}> ⚡TIE</span>}
                      </span>
                    )}
                  </div>
                  <div style={{display:'flex',gap:'3px',flexWrap:'wrap'}}>
                    {[1,2,3,4,5,6].map(p=>{
                      const isConsumed=consumed.has(p)&&place!==p;
                      const selected=place===p;
                      return(
                        <button key={p} onClick={()=>setPlacements(prev=>({...prev,[clan.id]:selected?null:p}))}
                          disabled={isConsumed&&!selected}
                          style={{...btnTiny,width:30,
                            background:selected?'rgba(200,160,80,.3)':isConsumed?'rgba(0,0,0,.3)':'rgba(255,255,255,.05)',
                            color:selected?T.gold:isConsumed?'rgba(255,255,255,.15)':T.textDim,
                            border:`1px solid ${selected?T.gold:'rgba(255,255,255,.08)'}`,
                            cursor:isConsumed&&!selected?'not-allowed':'pointer'}}>
                          {p}{p===1?'st':p===2?'nd':p===3?'rd':'th'}
                        </button>
                      );
                    })}
                    <button onClick={()=>setPlacements(prev=>({...prev,[clan.id]:place===0?null:0}))}
                      style={{...btnTiny,
                        background:place===0?'rgba(200,40,40,.3)':'rgba(255,255,255,.05)',
                        color:place===0?T.red:T.textDim,
                        border:`1px solid ${place===0?T.red:'rgba(255,255,255,.08)'}`}}>
                      DNF
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:'6px',marginTop:8}}>
            <button onClick={lockPlacements}
              style={{...btnAction,flex:1,background:'rgba(60,150,90,.25)',color:T.green,
                border:`1px solid ${T.green}`}}>
              &#x1F512; LOCK IN
            </button>
            <button onClick={clearPlacements} style={{...btnAction,background:'rgba(255,255,255,.05)',color:T.textDim}}>
              CLEAR
            </button>
            {currentEventScored&&(
              <button onClick={resetRound}
                style={{...btnAction,background:'rgba(200,40,40,.15)',color:T.red,
                  border:`1px solid rgba(200,40,40,.3)`}}>
                RESET
              </button>
            )}
          </div>
        </Section>
      )}

      {/* Display Control */}
      <Section title="DISPLAY CONTROL">
        <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:8}}>
          <button onClick={()=>{setActiveQuestion(null);setShowCombined(false);stopTimer();setTimerSeconds(0)}}
            style={{...btnAction,background:'rgba(200,160,80,.15)',color:T.gold,border:`1px solid rgba(200,160,80,.3)`}}>
            SCOREBOARD
          </button>
        </div>

        {/* Timer */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:'.65rem',color:T.textDim,marginBottom:4,letterSpacing:'1px'}}>COUNTDOWN</div>
          <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
            {[30,60,90,120,180,300].map(s=>(
              <button key={s} onClick={()=>{setShowCombined(false);startTimer(s)}}
                style={{...btnTiny,background:'rgba(255,255,255,.05)',color:T.textDim}}>
                {s<60?`${s}s`:`${s/60}m`}
              </button>
            ))}
            <input value={timerCustom} onChange={e=>setTimerCustom(e.target.value)}
              style={{...inputStyle,width:50,textAlign:'center'}} placeholder="sec"/>
            <button onClick={()=>{setShowCombined(false);startTimer(parseInt(timerCustom)||60)}}
              style={{...btnTiny,background:'rgba(60,150,90,.2)',color:T.green}}>GO</button>
          </div>
          {timerActive&&(
            <button onClick={()=>{stopTimer();setTimerSeconds(0);setShowCombined(false)}}
              style={{...btnAction,marginTop:4,background:'rgba(200,40,40,.2)',color:T.red,width:'100%'}}>
              &#9632; CANCEL TIMER
            </button>
          )}
        </div>

        {/* Questions */}
        {currentEvent&&currentEvent.questions.length>0&&(
          <div>
            <div style={{fontSize:'.65rem',color:T.textDim,marginBottom:4,letterSpacing:'1px'}}>QUESTIONS</div>
            <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
              {currentEvent.questions.map((q,i)=>(
                <button key={q.id} onClick={()=>{setShowCombined(false);setActiveQuestion(q)}}
                  style={{...btnTiny,background:'rgba(80,200,208,.1)',color:T.cyan,
                    border:`1px solid rgba(80,200,208,.2)`}}>
                  Q{i+1}
                </button>
              ))}
            </div>
            <button onClick={()=>{
              const q=currentEvent.questions[0];
              if(q)showQuestionAndTimer(q,parseInt(timerCustom)||60);
            }}
              style={{...btnAction,marginTop:4,background:'rgba(80,200,208,.1)',color:T.cyan,
                border:`1px solid rgba(80,200,208,.2)`,width:'100%'}}>
              &#9654; Q + TIMER
            </button>
            {activeQuestion&&(
              <button onClick={()=>{setActiveQuestion(null);setShowCombined(false)}}
                style={{...btnAction,marginTop:4,background:'rgba(255,255,255,.05)',color:T.textDim,width:'100%'}}>
                HIDE QUESTION
              </button>
            )}
          </div>
        )}
      </Section>
    </div>
  );
}

/* ══════════════════ SETUP PANEL ══════════════════ */
function SetupPanel({roster,clans,events,setClans,setEvents,
  addPerson,removePerson,assignToClan,unassignFromClan,quickAddToClan,
  newPersonName,setNewPersonName,quickAdds,setQuickAdds,
  handlePhotoUpload,fileInputRef,uploadTargetRef,
  setupSection,setSetupSection,getUnassigned,
  addQuestion,removeQuestion,newQuestionText,setNewQuestionText}){

  const unassigned=getUnassigned();

  return(
    <div>
      {/* Sub-tabs */}
      <div style={{display:'flex',gap:'4px',marginBottom:12}}>
        {[['people','PEOPLE'],['clans','TEAMS'],['events','EVENTS']].map(([key,label])=>(
          <button key={key} onClick={()=>setSetupSection(key)}
            style={{...btnSmall,flex:1,
              background:setupSection===key?'rgba(200,160,80,.15)':'transparent',
              color:setupSection===key?T.gold:T.textDim,
              border:`1px solid ${setupSection===key?'rgba(200,160,80,.3)':'transparent'}`}}>
            {label} {key==='people'&&`(${roster.length})`}
          </button>
        ))}
      </div>

      {/* PEOPLE */}
      {setupSection==='people'&&(
        <div>
          <div style={{display:'flex',gap:'4px',marginBottom:8}}>
            <input value={newPersonName} onChange={e=>setNewPersonName(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){addPerson(newPersonName);setNewPersonName('')}}}
              placeholder="Name" style={{...inputStyle,flex:1}}/>
            <button onClick={()=>{addPerson(newPersonName);setNewPersonName('')}}
              style={{...btnSmall,background:'rgba(60,150,90,.2)',color:T.green}}>+ ADD</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',maxHeight:400,overflow:'auto'}}>
            {roster.map(p=>{
              const clan=clans.find(c=>(c.memberIds||[]).includes(p.id));
              return(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:'8px',
                  padding:'6px',background:'rgba(0,0,0,.2)',borderRadius:4}}>
                  {/* Avatar */}
                  <div onClick={()=>{uploadTargetRef.current=p.id;fileInputRef.current?.click()}}
                    style={{width:32,height:32,borderRadius:'50%',cursor:'pointer',overflow:'hidden',flexShrink:0,
                      border:`2px solid ${clan?clan.accent:'rgba(255,255,255,.2)'}`,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      background:p.photo?'none':'rgba(0,0,0,.3)',fontSize:'.5rem',color:T.textDim}}>
                    {p.photo?(
                      <img src={p.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    ):(
                      <span>&#128247;</span>
                    )}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'.75rem',color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {p.name}
                    </div>
                    <div style={{fontSize:'.55rem',color:clan?clan.accent:T.textDim}}>
                      {clan?clan.name:'Unassigned'}
                    </div>
                  </div>
                  <button onClick={()=>removePerson(p.id)}
                    style={{...btnTiny,color:T.red,background:'rgba(200,40,40,.1)'}}>&times;</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* CLANS */}
      {setupSection==='clans'&&(
        <div>
          {unassigned.length>0&&(
            <div style={{padding:'8px',background:'rgba(200,160,80,.1)',borderRadius:4,marginBottom:8,
              border:`1px solid rgba(200,160,80,.2)`}}>
              <div style={{fontSize:'.65rem',color:T.gold,marginBottom:4,letterSpacing:'1px'}}>UNASSIGNED ({unassigned.length})</div>
              <div style={{fontSize:'.7rem',color:T.textDim}}>
                {unassigned.map(p=>p.name).join(', ')}
              </div>
            </div>
          )}
          {clans.map(clan=>{
            const members=(clan.memberIds||[]).map(mid=>roster.find(r=>r.id===mid)).filter(Boolean);
            return(
              <div key={clan.id} style={{marginBottom:10,padding:'8px',background:'rgba(0,0,0,.2)',
                borderRadius:4,borderLeft:`3px solid ${clan.accent}`}}>
                <div style={{fontSize:'.8rem',fontWeight:700,color:T.text,marginBottom:6}}>{clan.name}</div>
                {/* Current members */}
                <div style={{display:'flex',flexDirection:'column',gap:'3px',marginBottom:6}}>
                  {members.map(m=>(
                    <div key={m.id} style={{display:'flex',alignItems:'center',gap:'6px',
                      padding:'3px 6px',background:'rgba(0,0,0,.15)',borderRadius:3}}>
                      <div style={{width:22,height:22,borderRadius:'50%',overflow:'hidden',flexShrink:0,
                        border:`1px solid ${clan.accent}`,display:'flex',alignItems:'center',justifyContent:'center',
                        background:m.photo?'none':clan.color,fontSize:'.4rem',color:'#fff'}}>
                        {m.photo?<img src={m.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:
                          m.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
                      </div>
                      <span style={{fontSize:'.7rem',color:T.text,flex:1}}>{m.name}</span>
                      <button onClick={()=>unassignFromClan(m.id)}
                        style={{...btnTiny,color:T.red,background:'transparent',padding:'0 4px'}}>&times;</button>
                    </div>
                  ))}
                </div>
                {/* Available to add */}
                {unassigned.length>0&&(
                  <div style={{display:'flex',gap:'3px',flexWrap:'wrap',marginBottom:4}}>
                    {unassigned.map(p=>(
                      <button key={p.id} onClick={()=>assignToClan(p.id,clan.id)}
                        style={{...btnTiny,background:'rgba(255,255,255,.05)',color:T.textDim,fontSize:'.55rem'}}>
                        + {p.name}
                      </button>
                    ))}
                  </div>
                )}
                {/* Quick add */}
                <div style={{display:'flex',gap:'3px'}}>
                  <input value={quickAdds[clan.id]||''} placeholder="Quick add name"
                    onChange={e=>setQuickAdds(prev=>({...prev,[clan.id]:e.target.value}))}
                    onKeyDown={e=>{
                      if(e.key==='Enter'&&quickAdds[clan.id]?.trim()){
                        quickAddToClan(quickAdds[clan.id],clan.id);
                        setQuickAdds(prev=>({...prev,[clan.id]:''}));
                      }
                    }}
                    style={{...inputStyle,flex:1,fontSize:'.65rem'}}/>
                  <button onClick={()=>{
                    if(quickAdds[clan.id]?.trim()){
                      quickAddToClan(quickAdds[clan.id],clan.id);
                      setQuickAdds(prev=>({...prev,[clan.id]:''}));
                    }
                  }}
                    style={{...btnTiny,background:'rgba(60,150,90,.15)',color:T.green}}>+</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* EVENTS */}
      {setupSection==='events'&&(
        <div>
          {events.map((evt,i)=>(
            <div key={evt.id} style={{marginBottom:10,padding:'8px',background:'rgba(0,0,0,.2)',
              borderRadius:4,borderLeft:`3px solid ${evt.isFinale?T.gold:'rgba(255,255,255,.15)'}`}}>
              <div style={{display:'flex',gap:'4px',marginBottom:4}}>
                <input value={evt.name}
                  onChange={e=>setEvents(prev=>prev.map((ev,j)=>j===i?{...ev,name:e.target.value}:ev))}
                  style={{...inputStyle,flex:1,fontSize:'.75rem',fontWeight:600}}/>
                {evt.isFinale&&<span style={{fontSize:'.55rem',color:T.gold,alignSelf:'center'}}>★ FINALE</span>}
              </div>
              {/* Questions */}
              <div style={{marginLeft:8}}>
                {evt.questions.map((q,qi)=>(
                  <div key={q.id} style={{display:'flex',alignItems:'center',gap:'4px',marginBottom:3}}>
                    <span style={{fontSize:'.6rem',color:T.cyan,fontWeight:700,width:20}}>Q{qi+1}</span>
                    <span style={{fontSize:'.65rem',color:T.textDim,flex:1,overflow:'hidden',
                      textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{q.text}</span>
                    <button onClick={()=>removeQuestion(evt.id,q.id)}
                      style={{...btnTiny,color:T.red,background:'transparent',padding:'0 3px'}}>&times;</button>
                  </div>
                ))}
                <div style={{display:'flex',gap:'3px',marginTop:2}}>
                  <input placeholder="Add question..."
                    onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){
                      addQuestion(evt.id,e.target.value);e.target.value='';
                    }}}
                    style={{...inputStyle,flex:1,fontSize:'.6rem'}}/>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── SECTION WRAPPER ── */
function Section({title,children}){
  return(
    <div>
      <div style={{fontSize:'.65rem',color:T.gold,letterSpacing:'2px',fontFamily:"'Orbitron',sans-serif",
        marginBottom:8,paddingBottom:4,borderBottom:`1px solid rgba(200,160,80,.15)`}}>
        {title}
      </div>
      {children}
    </div>
  );
}

/* ── SHARED STYLES ── */
const btnSmall={
  padding:'5px 10px',border:'1px solid rgba(255,255,255,.1)',borderRadius:3,cursor:'pointer',
  background:'rgba(255,255,255,.05)',color:'#aaa',fontFamily:"'Exo 2',sans-serif",fontSize:'.65rem',
  fontWeight:600,letterSpacing:'.5px',transition:'all .15s'
};
const btnTiny={
  padding:'3px 6px',border:'1px solid rgba(255,255,255,.08)',borderRadius:2,cursor:'pointer',
  background:'rgba(255,255,255,.05)',color:'#888',fontFamily:"'Exo 2',sans-serif",fontSize:'.6rem',
  fontWeight:600,transition:'all .15s'
};
const btnAction={
  padding:'6px 12px',border:'1px solid rgba(255,255,255,.1)',borderRadius:3,cursor:'pointer',
  background:'rgba(255,255,255,.05)',color:'#aaa',fontFamily:"'Exo 2',sans-serif",fontSize:'.65rem',
  fontWeight:600,letterSpacing:'.5px',transition:'all .15s'
};
const inputStyle={
  padding:'5px 8px',background:'rgba(0,0,0,.3)',border:'1px solid rgba(255,255,255,.1)',
  borderRadius:3,color:'#e0d6c8',fontFamily:"'Exo 2',sans-serif",fontSize:'.7rem',outline:'none'
};
const overlayClose={
  position:'absolute',top:12,right:12,zIndex:60,background:'rgba(255,255,255,.1)',border:'none',
  color:'#fff',fontSize:'1.5rem',width:36,height:36,borderRadius:'50%',cursor:'pointer',
  display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
